[ModInfo]
Title = Fat Loot
Authors = KenUaena (Loot Drop Multiplier), Vardigard(More Loot), Sqitey
Description =
    <h1>⛏️ Resource Stacker</h1>
    <p>This mod is a tool for <b>end-game builders</b> — designed for huge buildings with massive resource requirements and aesthetic purposes. Stack resources super fast.</p>
    <h2>How It Works</h2>
    <table cellpadding="6" cellspacing="0" border="0">
    <tr>
    <td><b>🗡️ Destroyed Items / Killed Enemies</b></td>
    <td>Drop <b>500</b> of each material</td>
    </tr>
    <tr>
    <td><b>⛏️ Mining</b></td>
    <td>Greatly increased drops to match item &amp; enemy loot</td>
    </tr>
    <tr>
    <td><b>🌿 Pickable Resources</b></td>
    <td>Standard amounts <i>(plants, etc.)</i></td>
    </tr>
    <tr>
    <td><b>🔑 Orkish Key</b></td>
    <td>Drop remains <b>1</b></td>
    </tr>
    <tr>
    <td><b>🎲 Loot Chance</b></td>
    <td>Changed to <b>100%</b></td>
    </tr>
    </table>

