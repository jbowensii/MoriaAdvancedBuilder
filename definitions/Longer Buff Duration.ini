[ModInfo]
Title = Longer Buff Duration
Authors = KenUaena, Deathmajesty(Longer Treasure Pile Buff), momenaya(Longer Buffs), Letimineur(DLC Brew Buffs)
Description =
    <h1>✨ Extended Buffs</h1>
    
    <p>This mod extends the duration of buffs to <b>Approx 1 in game day/b>.</p>
    
    <h2>Affected Buff Types</h2>
    <table cellpadding="6" cellspacing="0" border="0">
    <tr>
    <td><b>🍖 Food Buffs</b></td>
    <td>Approx 1 in game day</td>
    </tr>
    <tr>
    <td><b>💎 Treasure Buffs</b></td>
    <td>Approx 1 in game day</td>
    </tr>
    <tr>
    <td><b>📖 Knowledge Buffs</b></td>
    <td>Approx 1 in game day</td>
    </tr>
    </table>
    
