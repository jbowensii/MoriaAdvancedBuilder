[ModInfo]
Title = Build Anywhere
Authors = Letimineur (Build Anywhere)
Description =
    <h1>✨ Build Anywhere</h1>
    
    <p>This mod allows building some constructions without a hearth.</p>
    
    <h2>Pieces</h2>
    <table cellpadding="6" cellspacing="0" border="0">
    <tr><td>FastTravelMapstone</td></tr>
    <tr><td>Crude_Stairs</td></tr>
    <tr><td>Crude_Stairs_05M_3mWide</td></tr>
    <tr><td>Crude_Stairs_2mWide</td></tr>
    <tr><td>Crude_Stairs_3m</td></tr>
    <tr><td>Crude_Stairs_3mWide_1M</td></tr>
    <tr><td>Crude_Stairs_3mWide_4M</td></tr>
    </table>
    
[Paths]
building|can_build_this_anywhere.def = true

[Settings]
include_secrets = False

